<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - 课题 AI 助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    .header {
      border-bottom: 2px solid #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 16px;
    }

    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    .btn.primary {
      background: #fff;
      color: #000;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      border: 2px solid #fff;
      padding: 24px;
    }

    .stat-value {
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }

    .history-list {
      border: 2px solid #fff;
    }

    .history-item {
      padding: 24px;
      border-bottom: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 20px;
      align-items: center;
      transition: background 0.2s;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .item-subject {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .item-meta {
      font-size: 14px;
      color: #888;
      display: flex;
      gap: 16px;
    }

    .item-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-word-count {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
    }

    .item-word-count small {
      font-size: 12px;
      font-weight: 400;
      color: #888;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-small:hover {
      background: #fff;
      color: #000;
    }

    .btn-small.danger {
      border-color: #ff4444;
      color: #ff4444;
    }

    .btn-small.danger:hover {
      background: #ff4444;
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: #888;
    }

    .empty-state .emoji {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #fff;
    }

    /* 详情模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal.active {
      display: block;
    }

    .modal-content {
      max-width: 900px;
      margin: 40px auto;
      background: #000;
      border: 2px solid #fff;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 2px solid #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 24px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .modal-body pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
    }

    .page-btn {
      padding: 10px 16px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    .page-btn:hover {
      background: #fff;
      color: #000;
    }

    .page-btn.active {
      background: #fff;
      color: #000;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .history-item {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .item-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📜 历史记录</h1>
    <div class="header-actions">
      <a href="/" class="btn">← 返回首页</a>
      <button class="btn primary" onclick="generateNew()">新建课题</button>
    </div>
  </div>

  <div class="container">
    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">总文档数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalWords">0</div>
        <div class="stat-label">总字数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="quLevel">0</div>
        <div class="stat-label">区级课题</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="shiLevel">0</div>
        <div class="stat-label">市级课题</div>
      </div>
    </div>

    <!-- 历史列表 -->
    <div id="historyList" class="history-list">
      <div class="empty-state">
        <span class="emoji">📭</span>
        <h2>暂无历史记录</h2>
        <p>生成第一个课题文档吧！</p>
      </div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="pagination" style="display: none;"></div>
  </div>

  <!-- 详情模态框 -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">文档详情</h2>
        <div style="display: flex; gap: 8px;">
          <button class="btn-small" onclick="downloadCurrent()">📥 下载 Word</button>
          <button class="btn-small" onclick="closeModal()">✕ 关闭</button>
        </div>
      </div>
      <div class="modal-body">
        <pre id="modalContent"></pre>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    const limit = 20;
    let currentDetail = null;

    // 获取 token
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (!token) {
      window.location.href = '/login.html';
    }

    // 加载历史记录
    async function loadHistory(page = 1) {
      try {
        const response = await fetch(`/api/history?page=${page}&limit=${limit}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.href = '/login.html';
          return;
        }

        const data = await response.json();

        if (data.success) {
          renderHistory(data.data);
          renderPagination(data.pagination);
          updateStats(data.data);
        }
      } catch (error) {
        console.error('加载失败:', error);
      }
    }

    // 渲染历史列表
    function renderHistory(list) {
      const container = document.getElementById('historyList');

      if (list.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="emoji">📭</span>
            <h2>暂无历史记录</h2>
            <p>生成第一个课题文档吧！</p>
          </div>
        `;
        return;
      }

      container.innerHTML = list.map(item => `
        <div class="history-item">
          <div>
            <div class="item-subject">${escapeHtml(item.subject)}</div>
            <div class="item-meta">
              <span>📊 ${item.level}</span>
              <span>📄 ${getDocumentTypeLabel(item.document_type)}</span>
              <span>📅 ${formatDate(item.created_at)}</span>
            </div>
          </div>
          <div class="item-word-count">
            ${item.word_count.toLocaleString()}<small> 字</small>
          </div>
          <div class="item-actions">
            <button class="btn-small" onclick="viewDetail(${item.id})">👁️ 查看</button>
            <button class="btn-small danger" onclick="deleteRecord(${item.id})">🗑️ 删除</button>
          </div>
        </div>
      `).join('');
    }

    // 渲染分页
    function renderPagination(pagination) {
      const container = document.getElementById('pagination');

      if (pagination.totalPages <= 1) {
        container.style.display = 'none';
        return;
      }

      container.style.display = 'flex';
      container.innerHTML = '';

      // 上一页
      container.innerHTML += `
        <button class="page-btn" onclick="loadHistory(${pagination.page - 1})" ${pagination.page === 1 ? 'disabled' : ''}>
          ← 上一页
        </button>
      `;

      // 页码
      for (let i = 1; i <= pagination.totalPages; i++) {
        if (i === 1 || i === pagination.totalPages || Math.abs(i - pagination.page) <= 2) {
          container.innerHTML += `
            <button class="page-btn ${i === pagination.page ? 'active' : ''}" onclick="loadHistory(${i})">
              ${i}
            </button>
          `;
        } else if (Math.abs(i - pagination.page) === 3) {
          container.innerHTML += '<span style="padding: 10px;">...</span>';
        }
      }

      // 下一页
      container.innerHTML += `
        <button class="page-btn" onclick="loadHistory(${pagination.page + 1})" ${pagination.page === pagination.totalPages ? 'disabled' : ''}>
          下一页 →
        </button>
      `;
    }

    // 更新统计
    function updateStats(list) {
      document.getElementById('totalCount').textContent = list.length;
      document.getElementById('totalWords').textContent = list.reduce((sum, item) => sum + item.word_count, 0).toLocaleString();
      document.getElementById('quLevel').textContent = list.filter(item => item.level === '区级').length;
      document.getElementById('shiLevel').textContent = list.filter(item => item.level === '市级').length;
    }

    // 查看详情
    async function viewDetail(id) {
      try {
        const response = await fetch(`/api/history/${id}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (data.success) {
          currentDetail = data.data;
          document.getElementById('modalTitle').textContent = `${data.data.subject} - ${getDocumentTypeLabel(data.data.document_type)}`;
          document.getElementById('modalContent').textContent = data.data.content;
          document.getElementById('detailModal').classList.add('active');
        }
      } catch (error) {
        console.error('加载详情失败:', error);
      }
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      currentDetail = null;
    }

    // 下载 Word
    async function downloadCurrent() {
      if (!currentDetail) return;

      try {
        const response = await fetch('/api/export-word', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: currentDetail.content,
            subject: currentDetail.subject,
            level: currentDetail.level
          })
        });

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentDetail.subject}-${getDocumentTypeLabel(currentDetail.document_type)}.docx`;
        a.click();
        window.URL.revokeObjectURL(url);
      } catch (error) {
        console.error('下载失败:', error);
      }
    }

    // 删除记录
    async function deleteRecord(id) {
      if (!confirm('确定删除这条记录吗？')) return;

      try {
        const response = await fetch(`/api/history/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (data.success) {
          loadHistory(currentPage);
        } else {
          alert('删除失败: ' + data.error);
        }
      } catch (error) {
        console.error('删除失败:', error);
      }
    }

    // 新建课题
    function generateNew() {
      window.location.href = '/';
    }

    // 工具函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getDocumentTypeLabel(type) {
      const labels = {
        'shenbao': '申报书',
        'kaiti': '开题报告',
        'zhongqi': '中期检查',
        'jieti': '结题报告'
      };
      return labels[type] || type;
    }

    // 点击模态框外部关闭
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.id === 'detailModal') {
        closeModal();
      }
    });

    // 初始加载
    loadHistory();
  </script>
</body>
</html>
