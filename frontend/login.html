<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 课题 AI 助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .logo .emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      border: 2px solid #fff;
      margin-bottom: 32px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      background: transparent;
      color: #fff;
      border: none;
    }

    .tab.active {
      background: #fff;
      color: #000;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #888;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
    }

    input::placeholder {
      color: #666;
    }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border: 2px solid #fff;
      background: #fff;
      color: #000;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: transparent;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      background: #ff4444;
      color: #fff;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 2px solid #ff4444;
    }

    .success {
      background: #00C851;
      color: #fff;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 2px solid #00C851;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link a:hover {
      color: #fff;
    }

    .divider {
      height: 2px;
      background: #333;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="emoji">📚</span>
      <h1>课题 AI 助手</h1>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登录</button>
      <button class="tab" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
      <div id="loginError" class="error" style="display: none;"></div>
      
      <div class="form-group">
        <label>用户名 / 邮箱</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" required>
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" required>
      </div>

      <button type="submit" class="btn" id="loginBtn">登录</button>
    </form>

    <!-- 注册表单 -->
    <form id="registerForm" class="form" onsubmit="handleRegister(event)">
      <div id="registerError" class="error" style="display: none;"></div>
      <div id="registerSuccess" class="success" style="display: none;"></div>
      
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="registerUsername" placeholder="3-20 个字符" required minlength="3" maxlength="20">
      </div>

      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="registerEmail" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" id="registerPassword" placeholder="至少 6 个字符" required minlength="6">
      </div>

      <button type="submit" class="btn" id="registerBtn">注册</button>
    </form>

    <div class="back-link">
      <a href="/">← 返回首页</a>
    </div>
  </div>

  <script>
    // 切换标签页
    function switchTab(tab) {
      // 更新标签页状态
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      // 更新表单显示
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      document.getElementById(tab + 'Form').classList.add('active');
      
      // 清除错误信息
      hideMessages();
    }

    // 隐藏所有消息
    function hideMessages() {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('registerError').style.display = 'none';
      document.getElementById('registerSuccess').style.display = 'none';
    }

    // 显示错误
    function showError(formId, message) {
      const errorEl = document.getElementById(formId + 'Error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    // 显示成功
    function showSuccess(message) {
      const successEl = document.getElementById('registerSuccess');
      successEl.textContent = message;
      successEl.style.display = 'block';
    }

    // 登录
    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.textContent = '登录中...';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // 保存 token
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // 跳转到首页
          window.location.href = '/';
        } else {
          showError('login', data.error || '登录失败');
        }
      } catch (error) {
        showError('login', '网络错误，请重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }

    // 注册
    async function handleRegister(e) {
      e.preventDefault();
      hideMessages();
      
      const username = document.getElementById('registerUsername').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const btn = document.getElementById('registerBtn');
      
      btn.disabled = true;
      btn.textContent = '注册中...';
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // 保存 token
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // 跳转到首页
          window.location.href = '/';
        } else {
          showError('register', data.error || '注册失败');
        }
      } catch (error) {
        showError('register', '网络错误，请重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '注册';
      }
    }

    // 检查是否已登录
    const token = localStorage.getItem('token');
    if (token) {
      // 已登录，直接跳转到首页
      window.location.href = '/';
    }
  </script>
</body>
</html>
