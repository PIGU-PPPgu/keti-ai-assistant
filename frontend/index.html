<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课题 AI 助手</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:   #E63946;
      --blue:  #457B9D;
      --amber: #F4A261;
      --green: #2D6A4F;
      --black: #1D1D1D;
      --white: #FAFAFA;
      --gray:  #E5E5E5;
      --gray2: #F0F0F0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--white);
      color: var(--black);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      border-right: 4px solid var(--red);
    }

    .logo {
      padding: 36px 28px 28px;
      border-bottom: 2px solid rgba(255,255,255,.1);
    }
    .logo h1 { font-size: 42px; font-weight: 900; letter-spacing: -3px; line-height: 1; }
    .logo .sub { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: .4; margin-top: 6px; }

    .nav { flex: 1; padding: 24px 16px; overflow-y: auto; }

    .nav-item {
      padding: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: border-color .2s, background .2s;
      border-radius: 0 4px 4px 0;
    }
    .nav-item:hover { background: rgba(255,255,255,.05); border-left-color: var(--red); }
    .nav-item.active { background: rgba(255,255,255,.08); border-left-color: var(--blue); }
    .nav-item .icon { font-size: 18px; margin-bottom: 8px; }
    .nav-item .label { font-size: 12px; font-weight: 600; }
    .nav-item .meta { font-size: 10px; opacity: .4; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }

    .sidebar-footer {
      padding: 20px;
      border-top: 2px solid rgba(255,255,255,.1);
    }
    .btn-login {
      width: 100%; padding: 10px;
      background: transparent; border: 2px solid rgba(255,255,255,.4);
      color: var(--white); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
      transition: all .2s; font-family: inherit;
    }
    .btn-login:hover { background: var(--white); color: var(--black); }

    /* ---- Main ---- */
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 36px;
      border-bottom: 2px solid var(--gray);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .status-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      transition: background .3s;
    }
    .dot.busy { background: var(--amber); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }

    /* ---- Content area ---- */
    .content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      overflow: hidden;
    }

    /* Chat panel */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--gray);
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      max-width: 80%;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-bubble {
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: var(--black);
      color: var(--white);
    }
    .msg.assistant .msg-bubble {
      background: var(--gray2);
      border-left: 3px solid var(--blue);
    }

    /* Plan card */
    .plan-card {
      background: var(--white);
      border: 2px solid var(--black);
      padding: 24px;
      margin-top: 8px;
    }
    .plan-card h3 {
      font-size: 13px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 2px solid var(--black);
    }
    .plan-params { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .plan-param { }
    .plan-param .key { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: .5; margin-bottom: 4px; }
    .plan-param .val { font-size: 14px; font-weight: 600; }
    .plan-actions { display: flex; gap: 12px; }
    .btn-confirm {
      flex: 1; padding: 12px;
      background: var(--black); color: var(--white);
      border: none; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: background .2s; font-family: inherit;
    }
    .btn-confirm:hover { background: var(--blue); }
    .btn-cancel {
      padding: 12px 20px;
      background: transparent; color: var(--black);
      border: 2px solid var(--gray); font-size: 12px;
      cursor: pointer; font-family: inherit; transition: border-color .2s;
    }
    .btn-cancel:hover { border-color: var(--black); }

    /* Options */
    .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .option-btn {
      padding: 8px 16px;
      background: transparent; border: 2px solid var(--gray);
      font-size: 12px; cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .option-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }

    /* Input */
    .input-area {
      padding: 20px 36px;
      border-top: 2px solid var(--gray);
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1; padding: 14px 18px;
      border: 2px solid var(--gray); background: var(--white);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    .input-area input:focus { border-color: var(--black); }
    .btn-send {
      padding: 14px 28px;
      background: var(--black); color: var(--white);
      border: none; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: background .2s; font-family: inherit;
    }
    .btn-send:hover { background: var(--red); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }

    /* ---- Agent Panel (right) ---- */
    .agent-panel {
      display: flex;
      flex-direction: column;
      background: var(--black);
      color: var(--white);
      overflow: hidden;
    }

    .agent-header {
      padding: 20px 24px;
      border-bottom: 2px solid rgba(255,255,255,.1);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
    }

    .agent-list { flex: 1; overflow-y: auto; padding: 16px; }

    .agent-item {
      padding: 16px;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,.1);
      transition: border-color .3s;
    }
    .agent-item.active { border-color: var(--amber); }
    .agent-item.done { border-color: var(--green); }
    .agent-item.error { border-color: var(--red); }

    .agent-name { font-size: 11px; font-weight: 600; margin-bottom: 6px; }
    .agent-status {
      font-size: 10px; opacity: .6; text-transform: uppercase; letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .agent-score {
      margin-top: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .score-bar {
      flex: 1; height: 3px; background: rgba(255,255,255,.1); border-radius: 2px;
    }
    .score-fill {
      height: 100%; border-radius: 2px;
      background: var(--green);
      transition: width .5s ease;
    }
    .score-fill.low { background: var(--red); }
    .score-fill.mid { background: var(--amber); }
    .score-num { font-size: 11px; font-weight: 600; min-width: 24px; text-align: right; }

    .agent-summary {
      padding: 16px;
      border-top: 2px solid rgba(255,255,255,.1);
      font-size: 11px;
    }
    .agent-summary .avg { font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .agent-summary .avg-label { opacity: .4; text-transform: uppercase; letter-spacing: 1px; }

    /* Result panel */
    .result-panel {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .result-panel.visible { display: flex; }

    .result-toolbar {
      padding: 16px 36px;
      border-bottom: 2px solid var(--gray);
      display: flex; gap: 12px; align-items: center;
      flex-shrink: 0;
    }
    .result-title { flex: 1; font-size: 14px; font-weight: 600; }
    .btn-export {
      padding: 10px 20px;
      background: var(--black); color: var(--white);
      border: none; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-export:hover { background: var(--blue); }
    .btn-new {
      padding: 10px 20px;
      background: transparent; color: var(--black);
      border: 2px solid var(--gray); font-size: 11px;
      cursor: pointer; font-family: inherit; transition: border-color .2s;
    }
    .btn-new:hover { border-color: var(--black); }

    .result-content {
      flex: 1; overflow-y: auto;
      padding: 36px;
      font-size: 14px; line-height: 1.8;
      white-space: pre-wrap;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <h1>课题<br>AI</h1>
    <div class="sub">Research Assistant</div>
  </div>
  <nav class="nav">
    <div class="nav-item active" onclick="switchMode('chat')">
      <div class="icon">✦</div>
      <div class="label">新建课题</div>
      <div class="meta">Multi-Agent</div>
    </div>
    <div class="nav-item" onclick="switchMode('history')">
      <div class="icon">◈</div>
      <div class="label">历史记录</div>
      <div class="meta">My Documents</div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-login" onclick="location.href='login.html'">登录 / 注册</button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">新建课题文档</span>
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">就绪</span>
    </div>
  </div>

  <div class="content">
    <!-- Chat + Result -->
    <div style="display:flex;flex-direction:column;overflow:hidden;position:relative;">

      <!-- Chat panel -->
      <div class="chat-panel" id="chatPanel">
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <input type="text" id="msgInput" placeholder="告诉我你需要什么课题文档..." />
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
      </div>

      <!-- Result panel (生成完成后显示) -->
      <div class="result-panel" id="resultPanel">
        <div class="result-toolbar">
          <span class="result-title" id="resultTitle">课题文档</span>
          <button class="btn-new" onclick="startNew()">新建</button>
          <button class="btn-export" onclick="exportWord()">导出 Word</button>
        </div>
        <div class="result-content" id="resultContent"></div>
      </div>
    </div>

    <!-- Agent Panel -->
    <div class="agent-panel">
      <div class="agent-header">Agent 工作台</div>
      <div class="agent-list" id="agentList">
        <div style="padding:20px;opacity:.4;font-size:12px;text-align:center;">
          等待生成任务...
        </div>
      </div>
      <div class="agent-summary" id="agentSummary" style="display:none">
        <div class="avg" id="avgScore">—</div>
        <div class="avg-label">平均质量分</div>
      </div>
    </div>
  </div>
</main>

<script>
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2);
let currentDocType = null;
let generatedContent = '';
let generatedTitle = '';
let isGenerating = false;

// ---- UI helpers ----
function setStatus(text, busy = false) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot' + (busy ? ' busy' : '');
}

function addMessage(role, content, extra = null) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (extra?.type === 'plan') {
    div.innerHTML = buildPlanCard(extra);
  } else if (extra?.type === 'question' && extra.options) {
    div.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>` + buildOptions(extra.options);
  } else {
    div.innerHTML = `<div class="msg-bubble">${escHtml(content)}</div>`;
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function buildOptions(options) {
  return `<div class="options">${options.map(o =>
    `<button class="option-btn" onclick="sendText('${escHtml(o)}')">${escHtml(o)}</button>`
  ).join('')}</div>`;
}

function buildPlanCard(data) {
  const p = data.params;
  const rows = [
    p.level    && ['课题级别', p.level],
    p.subject  && ['学科', p.subject],
    p.grade    && ['学段', p.grade],
    p.direction && ['研究方向', p.direction],
    ['课题名称', p.title || '自动生成'],
  ].filter(Boolean);

  return `
    <div class="plan-card">
      <h3>生成计划 · ${escHtml(data.docTypeName)}</h3>
      <div class="plan-params">
        ${rows.map(([k,v]) => `<div class="plan-param"><div class="key">${k}</div><div class="val">${escHtml(v)}</div></div>`).join('')}
      </div>
      <div style="font-size:12px;opacity:.6;margin-bottom:16px;">
        多 Agent 并行生成 · 每章独立评审优化 · 预计 1-3 分钟
      </div>
      <div class="plan-actions">
        <button class="btn-confirm" onclick="confirmPlan()">确认，开始生成</button>
        <button class="btn-cancel" onclick="sendText('重新开始')">重新填写</button>
      </div>
    </div>`;
}

// ---- Agent panel ----
function initAgentPanel(sections) {
  const list = document.getElementById('agentList');
  list.innerHTML = sections.map(s => `
    <div class="agent-item" id="agent-${s.id}">
      <div class="agent-name">${s.name}</div>
      <div class="agent-status"><span class="dot"></span> 等待中</div>
    </div>
  `).join('');
}

function updateAgent(sectionId, status, score) {
  const el = document.getElementById(`agent-${sectionId}`);
  if (!el) return;

  const statusMap = {
    generating: ['busy', '生成中...'],
    reviewing:  ['busy', '评审中...'],
    scored:     ['done', `评分: ${score}/10`],
    rewriting:  ['busy', `重写中 (原分: ${score})`],
  };

  const [cls, text] = statusMap[status] ?? ['', status];
  el.className = `agent-item ${cls}`;
  el.querySelector('.agent-status').innerHTML =
    `<span class="dot ${cls === 'busy' ? 'busy' : ''}"></span> ${text}`;

  if (score !== null && score !== undefined) {
    let scoreHtml = el.querySelector('.agent-score');
    if (!scoreHtml) {
      scoreHtml = document.createElement('div');
      scoreHtml.className = 'agent-score';
      el.appendChild(scoreHtml);
    }
    const pct = (score / 10) * 100;
    const fillCls = score >= 8 ? '' : score >= 6 ? 'mid' : 'low';
    scoreHtml.innerHTML = `
      <div class="score-bar"><div class="score-fill ${fillCls}" style="width:${pct}%"></div></div>
      <div class="score-num">${score}</div>`;
  }
}

function showAvgScore(avg) {
  const el = document.getElementById('agentSummary');
  el.style.display = 'block';
  document.getElementById('avgScore').textContent = avg.toFixed(1);
}

// ---- API ----
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isGenerating) return;
  input.value = '';
  await sendText(text);
}

async function sendText(text) {
  if (isGenerating) return;
  addMessage('user', text);
  setStatus('思考中...', true);
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('/api/chat/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: SESSION_ID, message: text }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    handleReply(data.reply);
  } catch (e) {
    addMessage('assistant', '出错了：' + e.message);
  } finally {
    setStatus('就绪');
    document.getElementById('sendBtn').disabled = false;
  }
}

function handleReply(reply) {
  if (reply.type === 'plan') {
    currentDocType = reply.docType;
    addMessage('assistant', '', reply);
  } else if (reply.type === 'start_generation') {
    startGeneration();
  } else if (reply.type === 'question') {
    addMessage('assistant', reply.content, reply);
  } else {
    addMessage('assistant', reply.content);
  }
}

function confirmPlan() {
  sendText('确认');
}

// ---- Generation with SSE ----
async function startGeneration() {
  isGenerating = true;
  setStatus('生成中...', true);
  document.getElementById('sendBtn').disabled = true;

  // 初始化 agent 面板（根据文档类型）
  const sectionDefs = {
    shenbao: [
      {id:'title',name:'基本信息'},{id:'background',name:'研究背景与意义'},
      {id:'literature',name:'研究现状述评'},{id:'objectives',name:'研究目标与内容'},
      {id:'framework',name:'研究框架'},{id:'innovation',name:'重难点与创新'},
      {id:'methodology',name:'研究方法与计划'},{id:'results',name:'预期成果'},
      {id:'budget',name:'经费预算'},{id:'references',name:'参考文献'},
    ],
    kaiti:  [{id:'plan',name:'研究方案'},{id:'literature',name:'文献综述'},{id:'methodology',name:'研究方法'},{id:'timeline',name:'时间安排'},{id:'results',name:'预期成果'},{id:'budget',name:'经费预算'},{id:'references',name:'参考文献'}],
    zhongqi:[{id:'progress',name:'研究进展'},{id:'achievements',name:'阶段成果'},{id:'issues',name:'问题与对策'},{id:'next',name:'下一步计划'},{id:'budget',name:'经费使用'}],
    jieti:  [{id:'summary',name:'工作总结'},{id:'results',name:'研究成果'},{id:'innovation',name:'创新点'},{id:'value',name:'应用价值'},{id:'issues',name:'问题建议'},{id:'list',name:'成果清单'},{id:'budget',name:'经费决算'},{id:'references',name:'参考文献'}],
  };
  initAgentPanel(sectionDefs[currentDocType] ?? []);

  const statusMsg = addMessage('assistant', '⚡ 多 Agent 并行生成中，请稍候...');

  const es = new EventSource(`/api/chat/generate/stream?sessionId=${SESSION_ID}`);

  es.addEventListener('progress', e => {
    const d = JSON.parse(e.data);
    updateAgent(d.sectionId, d.status, d.score);
  });

  es.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    setStatus(d.message, true);
  });

  es.addEventListener('done', e => {
    const d = JSON.parse(e.data);
    es.close();
    isGenerating = false;

    generatedContent = d.content;
    generatedTitle = d.title;

    showAvgScore(d.avgScore);
    showResult(d);
    setStatus('生成完成');
    document.getElementById('sendBtn').disabled = false;
  });

  es.addEventListener('error', e => {
    es.close();
    isGenerating = false;
    const d = e.data ? JSON.parse(e.data) : { message: '生成失败' };
    addMessage('assistant', '❌ ' + d.message);
    setStatus('就绪');
    document.getElementById('sendBtn').disabled = false;
  });
}

function showResult(data) {
  document.getElementById('chatPanel').style.display = 'none';
  const rp = document.getElementById('resultPanel');
  rp.classList.add('visible');
  document.getElementById('resultTitle').textContent = data.title;
  document.getElementById('resultContent').textContent = data.content;
  document.getElementById('topbarTitle').textContent = data.title;
}

function startNew() {
  document.getElementById('chatPanel').style.display = 'flex';
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('agentList').innerHTML = '<div style="padding:20px;opacity:.4;font-size:12px;text-align:center;">等待生成任务...</div>';
  document.getElementById('agentSummary').style.display = 'none';
  document.getElementById('topbarTitle').textContent = '新建课题文档';
  currentDocType = null;
  generatedContent = '';
  generatedTitle = '';
  // 重置服务端会话
  fetch('/api/chat/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: SESSION_ID, message: 'reset' }),
  });
}

async function exportWord() {
  if (!generatedContent) return;
  const res = await fetch('/api/export/word', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: generatedContent, title: generatedTitle }),
  });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (generatedTitle || '课题文档') + '.docx';
  a.click();
  URL.revokeObjectURL(url);
}

function switchMode(mode) {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', (mode === 'chat' && i === 0) || (mode === 'history' && i === 1));
  });
  if (mode === 'history') location.href = 'history.html';
}

// Enter to send
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
